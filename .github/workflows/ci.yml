name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type-check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

  # ── 2. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint (next lint)
        run: npm run lint

  # ── 3. Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Vitest
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── 4. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      # Public Supabase keys are needed at build time so Next.js can inline them.
      # Add these as repository secrets (Settings → Secrets → Actions).
      # The fallback placeholder values allow the build job to run even before
      # secrets are configured — the app won't function at runtime without real
      # values, but the build itself will succeed.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}
      NEXT_PUBLIC_WECHAT_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: next build
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ── 5. CI gate ───────────────────────────────────────────────────────────────
  # A single status check that branch-protection rules can target.
  ci:
    name: CI Gate
    needs: [typecheck, lint, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.lint.result }}"      != "success" ||
                "${{ needs.test.result }}"      != "success" ||
                "${{ needs.build.result }}"     != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
